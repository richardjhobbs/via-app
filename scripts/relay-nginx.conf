# VIA NOSTR relay — reverse proxy for wss://relay.getvia.xyz -> the khatru
# relay on 127.0.0.1:7777 (pm2 process "via-relay" on the VPS).
# Install: /etc/nginx/sites-available/relay.getvia.xyz, symlink into
# sites-enabled, `nginx -t`, reload, then `certbot --nginx -d relay.getvia.xyz`
# adds the TLS (443) block + http->https redirect.
server {
    listen 80;
    listen [::]:80;
    server_name relay.getvia.xyz;

    location / {
        proxy_pass http://127.0.0.1:7777;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
