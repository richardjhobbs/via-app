# getvia.net — proxy mirror of realrealgenuine.com
# Serves identical RRG content through an alternate hostname so users
# whose DNS is blocked by Cisco Umbrella / Quad9 can still reach the site
# while the classifier disputes propagate. Also doubles as a permanent
# fallback.
#
# Strategy:
#   - Host header rewritten to realrealgenuine.com so Next.js sees the
#     canonical domain. No app-side changes needed.
#   - sub_filter rewrites absolute https://realrealgenuine.com URLs in
#     HTML responses → https://getvia.net so internal navigation stays
#     on the proxy domain.
#   - JSON / CSS / JS are NOT rewritten; agent-facing endpoints (/mcp,
#     /agent.json, /.well-known/*) keep their canonical identity.
#
# Let's Encrypt cert obtained via certbot --nginx (rewrites this block
# to add listen 443 + SSL directives).

server {
    server_name getvia.net www.getvia.net;

    add_header Strict-Transport-Security  'max-age=31536000; includeSubDomains' always;
    add_header X-Content-Type-Options     'nosniff' always;
    add_header X-Frame-Options            'SAMEORIGIN' always;
    add_header Referrer-Policy            'strict-origin-when-cross-origin' always;
    add_header Permissions-Policy         'camera=(), microphone=(), geolocation=()' always;

    # ── Next.js static assets (served by nginx, not proxied) ─────────────
    location /_next/static/ {
        alias /home/agent/apps/rrg/.next/static/;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ── MCP endpoints: proxied, NO sub_filter (keep canonical identity) ──
    location /mcp {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host realrealgenuine.com;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }

    location ~ ^/brand/[^/]+/mcp$ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host realrealgenuine.com;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }

    # ── Default route: proxy + HTML rewrite ──────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host realrealgenuine.com;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Disable upstream gzip so sub_filter can scan response bodies.
        proxy_set_header   Accept-Encoding "";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;

        # Rewrite canonical URLs so internal links stay on the proxy host.
        # Only text/html is rewritten: JSON, JS, CSS, MCP, and agent-facing
        # well-known files keep their canonical realrealgenuine.com identity.
        sub_filter 'https://realrealgenuine.com'      'https://getvia.net';
        sub_filter 'https://www.realrealgenuine.com'  'https://www.getvia.net';
        sub_filter_once off;
        sub_filter_types text/html;
    }

    listen 80;
    listen [::]:80;
}
