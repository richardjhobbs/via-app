name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/agent/apps/rrg
            git pull origin master
            npm install
            # Guardrail C: split invariant test (fast, fails fast on regression)
            npm run test
            # Guardrail B: on-chain creator audit (RPC-bound, ~2-3 min)
            # Blocks deploy if any brand-owned drop is registered with the
            # wrong on-chain creator (post-mortem: memory/feedback_register_drop_creator_must_be_platform.md)
            node scripts/ci-audit-check.mjs
            npm run build
            cp -r .next/static .next/standalone/.next/static
            mkdir -p .next/standalone/public
            cp -r public/. .next/standalone/public/
            ln -sf /home/agent/apps/rrg/.env.local .next/standalone/.env.local
            /home/agent/.npm-global/lib/node_modules/pm2/bin/pm2 restart rrg-app
            echo "Deploy complete at $(date)"
