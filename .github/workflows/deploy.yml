name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /home/agent/apps/rrg
            # Idempotent sync with origin: VPS is one-way deploy target,
            # any local edits are stale and must be discarded. Without
            # this, a single dirty file (e.g. npm install regen of
            # package-lock.json) blocks every subsequent `git pull` and
            # silently strands commits. Matches the canonical recovery
            # in memory/vps_deployment.md.
            git fetch origin
            git reset --hard origin/master
            git clean -fd
            # `npm install`, not `npm ci`. The lockfile is out of sync
            # with package.json on Linux (transitive @coinbase/wallet-sdk
            # version differs from what was recorded on Windows) and
            # `npm ci` refuses to install. Any mutation `npm install`
            # makes to the lockfile is discarded by the `git reset
            # --hard` at the top of the next deploy, so it does not
            # strand subsequent runs. Fix the lockfile properly later.
            npm install
            # Guardrail C: split invariant test (fast, fails fast on regression)
            npm run test
            # Guardrail B: on-chain creator audit (RPC-bound, ~2-3 min)
            # Blocks deploy if any brand-owned drop is registered with the
            # wrong on-chain creator (post-mortem: memory/feedback_register_drop_creator_must_be_platform.md)
            node scripts/ci-audit-check.mjs
            # Clean build: Next.js 16 + Turbopack incremental builds do not
            # always reconcile route-file moves/deletes between deploys; the
            # client reference manifest ends up out of sync and every page
            # 500s with "Invariant: client reference manifest for route X
            # does not exist". Wiping .next before every build is the cheap
            # guard. Costs ~30s of extra build time.
            rm -rf .next
            npm run build
            cp -r .next/static .next/standalone/.next/static
            mkdir -p .next/standalone/public
            cp -r public/. .next/standalone/public/
            ln -sf /home/agent/apps/rrg/.env.local .next/standalone/.env.local
            /home/agent/.npm-global/lib/node_modules/pm2/bin/pm2 restart rrg-app
            echo "Deploy complete at $(date)"
