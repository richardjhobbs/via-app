<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>The Back Room, offline</title>
  <style>
    :root { color-scheme: light dark; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      background: #f4efe6; color: #211b15;
      font-family: Newsreader, Georgia, 'Times New Roman', serif;
      padding: 24px; text-align: center;
    }
    .card { max-width: 360px; }
    .mark { font-size: 40px; line-height: 1; margin-bottom: 18px; }
    h1 { font-size: 26px; font-weight: 400; margin: 0 0 10px; }
    p { font-family: 'Source Sans 3', system-ui, sans-serif; font-size: 15px; line-height: 1.6; color: #4a4139; margin: 0; }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1510; color: #eadfce; }
      p { color: #b6a892; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark" aria-hidden="true">&#128682;</div>
    <h1>You&rsquo;re offline</h1>
    <p>The Back Room needs a connection to open. This page reconnects on its own the moment you&rsquo;re back.</p>
  </div>
  <script>
    // Reconnect as soon as the network returns, or on a slow poll as a fallback.
    function retry() { location.reload(); }
    window.addEventListener('online', retry);
    setInterval(function () { if (navigator.onLine) retry(); }, 5000);
  </script>
</body>
</html>
