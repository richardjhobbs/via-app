<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="15">
  <meta name="robots" content="noindex">
  <title>Updating · Real Real Genuine</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
    }
    .wordmark {
      font-weight: 600;
      letter-spacing: 0.18em;
      font-size: 13px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 48px;
    }
    h1 {
      font-weight: 500;
      font-size: clamp(22px, 4vw, 30px);
      letter-spacing: -0.01em;
      margin: 0 0 12px;
      line-height: 1.25;
    }
    p {
      font-size: 15px;
      color: #aaa;
      margin: 0;
      line-height: 1.5;
      max-width: 32ch;
    }
    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fff;
      margin-right: 8px;
      vertical-align: 2px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50%      { opacity: 1; }
    }
    footer {
      margin-top: 48px;
      font-size: 12px;
      color: #555;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="wordmark">Real Real Genuine</div>
    <h1><span class="dot"></span>We are updating.</h1>
    <p>Back in a moment. This page will refresh automatically.</p>
    <footer>realrealgenuine.com</footer>
  </div>
</body>
</html>
