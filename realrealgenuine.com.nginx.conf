# realrealgenuine.com — reverse proxy to Vercel production
# All routes proxied to Vercel; no local Next.js process needed.

upstream vercel_rrg {
    server rrg-richard-entrepotasis-projects.vercel.app:443;
    keepalive 8;
}

server {
    server_name realrealgenuine.com www.realrealgenuine.com;

    # ── Security headers ─────────────────────────────────────────────────
    add_header Strict-Transport-Security  'max-age=31536000; includeSubDomains' always;
    add_header X-Content-Type-Options     'nosniff' always;
    add_header X-Frame-Options            'SAMEORIGIN' always;
    add_header Referrer-Policy            'strict-origin-when-cross-origin' always;
    add_header Permissions-Policy         'camera=(), microphone=(), geolocation=()' always;

    # ── Static files (terms, privacy, collection.png, favicon, avatars) ──
    root /var/www/realrealgenuine.com;

    location ^~ /avatars/ {
        try_files $uri =404;
    }

    location = /terms {
        try_files /terms.html =404;
    }

    location = /privacy {
        try_files /privacy.html =404;
    }

    # ── agent.json / .well-known ─────────────────────────────────────────
    location = /agent.json {
        proxy_pass         https://vercel_rrg;
        proxy_ssl_server_name on;
        proxy_set_header   Host realrealgenuine.com;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /.well-known/agent.json {
        proxy_pass         https://vercel_rrg;
        proxy_ssl_server_name on;
        proxy_set_header   Host realrealgenuine.com;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── MCP endpoint (SSE streaming — no buffering) ──────────────────────
    location /mcp {
        proxy_pass         https://vercel_rrg;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header   Host realrealgenuine.com;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }

    # ── Per-brand MCP endpoints (SSE streaming) ──────────────────────────
    location ~ ^/brand/[^/]+/mcp$ {
        proxy_pass         https://vercel_rrg;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header   Host realrealgenuine.com;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }

    # ── Root redirect ────────────────────────────────────────────────────
    location = / {
        return 302 /rrg;
    }

    # ── Everything else → Vercel ─────────────────────────────────────────
    location / {
        # Try local static files first, then proxy to Vercel
        try_files $uri @vercel;
    }

    location @vercel {
        proxy_pass         https://vercel_rrg;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host realrealgenuine.com;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    listen 80;
    listen [::]:80;
}
