# realrealgenuine.com — RRG Next.js app
# Next.js on localhost:3001, static files from /var/www/realrealgenuine.com
#
# NOTE: Vercel has deployment protection enabled so we cannot proxy directly
# to Vercel without adding realrealgenuine.com as a custom domain there.
# For now, the VPS runs its own Next.js build on port 3001.
# To deploy new code: git pull && npm run build && restart next-server.

server {
    server_name realrealgenuine.com www.realrealgenuine.com;

    # ── Security headers ─────────────────────────────────────────────────
    add_header Strict-Transport-Security  'max-age=31536000; includeSubDomains' always;
    add_header X-Content-Type-Options     'nosniff' always;
    add_header X-Frame-Options            'SAMEORIGIN' always;
    add_header Referrer-Policy            'strict-origin-when-cross-origin' always;
    add_header Permissions-Policy         'camera=(), microphone=(), geolocation=()' always;

    # ── Static site root ─────────────────────────────────────────────────
    root /var/www/realrealgenuine.com;
    index index.html;

    # ── RRG MCP endpoint (SSE streaming — no buffering) ──────────────────
    location /mcp {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }

    # ── Per-brand MCP endpoints (SSE streaming) ──────────────────────────
    location ~ ^/brand/[^/]+/mcp$ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }

    # ── RRG API routes ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── RRG admin panel ──────────────────────────────────────────────────
    location /admin/rrg {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── RRG Next.js app (all dynamic routes) ─────────────────────────────
    location /rrg {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Brand pages ──────────────────────────────────────────────────────
    location /brand/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Agents pages ─────────────────────────────────────────────────────
    location /agents {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Creator pages ────────────────────────────────────────────────────
    location /creator {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Drops page ───────────────────────────────────────────────────────
    location /drops {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Next.js static assets ────────────────────────────────────────────
    location /_next/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Root: redirect to /rrg ───────────────────────────────────────────
    location = / {
        return 302 /rrg;
    }

    # ── Static files (terms, privacy, collection.png, favicon) ───────────
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # NOTE: SSL block is managed by Certbot and appended to the deployed
    # copy in /etc/nginx/sites-enabled/. Do not include SSL directives here.
    listen 80;
    listen [::]:80;
}
